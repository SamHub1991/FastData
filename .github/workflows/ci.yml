name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      with:
        nuget-version: '6.x'
    
    - name: Restore packages
      run: nuget restore FastData.sln
    
    - name: Build
      run: msbuild FastData.sln /p:Configuration=Release /p:Platform="Any CPU"
    
    - name: Run tests
      run: dotnet test FastData.Tests/FastData.Tests.csproj --logger trx --results-directory TestResults
    
    - name: Publish test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults/
        retention-days: 7

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FastData-Build
        path: |
          FastData/bin/Release/
          FastData.Tooling/bin/Release/
          FastData.ModelGenerator.WinForms/bin/Release/
          FastData.SyncTool.WinForms/bin/Release/
        retention-days: 7
